services:
  - type: web
    name: gigcover-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    plan: starter
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: '*'
      - key: DB_PATH
        value: /var/data/gigcover.db
    disk:
      name: gigcover-data
      mountPath: /var/data
      sizeGB: 1
